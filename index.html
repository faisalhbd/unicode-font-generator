<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unicode Font Generator – MYFLiXBD</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0a0a0a;
      color: #f0f0f0;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      font-size: 1.6rem;
      font-weight: 700;
      color: #e22;
      margin-bottom: 0.3rem;
      letter-spacing: 0.04em;
    }

    .subtitle {
      text-align: center;
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 1.8rem;
    }

    .input-wrap {
      display: flex;
      gap: 10px;
      margin-bottom: 1.8rem;
    }

    input[type="text"] {
      flex: 1;
      font-size: 1rem;
      padding: 12px 16px;
      border: 2px solid #e22;
      border-radius: 8px;
      background: #1a1a1a;
      color: #fff;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus { border-color: #ff4444; }

    .clear-btn {
      padding: 12px 18px;
      border: 2px solid #555;
      border-radius: 8px;
      background: transparent;
      color: #aaa;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .clear-btn:hover { border-color: #e22; color: #e22; }

    .grid { display: flex; flex-direction: column; gap: 10px; }

    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 14px 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: border-color 0.2s;
    }

    .card:hover { border-color: #e22; }

    .style-label {
      font-size: 11px;
      color: #666;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .preview-text {
      font-size: 1.4rem;
      font-weight: 700;
      color: #e22;
      letter-spacing: 0.03em;
      word-break: break-all;
    }

    .copy-btn {
      flex-shrink: 0;
      margin-left: 12px;
      padding: 7px 18px;
      border: 2px solid #e22;
      border-radius: 6px;
      background: transparent;
      color: #e22;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.18s;
      white-space: nowrap;
    }

    .copy-btn:hover { background: #e22; color: #fff; }
    .copy-btn.copied { background: #e22; color: #fff; }

    footer {
      text-align: center;
      margin-top: 2.5rem;
      font-size: 0.75rem;
      color: #444;
    }

    @media (max-width: 480px) {
      .preview-text { font-size: 1.1rem; }
      h1 { font-size: 1.3rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Unicode Font Generator</h1>
    <p class="subtitle">Type your text — copy any style for Facebook posts</p>

    <div class="input-wrap">
      <input type="text" id="inp" value="MYFLiXBD.COM" oninput="gen()" placeholder="Type here..." />
      <button class="clear-btn" onclick="document.getElementById('inp').value='';gen()">Clear</button>
    </div>

    <div class="grid" id="out"></div>

    <footer>Unicode Font Generator &copy; MYFLiXBD.COM</footer>
  </div>

  <script>
    const styles = [
      { label: "Bold",          fn: c => cv(c, 0x1D400, 0x1D41A, 0x1D7CE) },
      { label: "Italic",        fn: c => cv(c, 0x1D434, 0x1D44E, null) },
      { label: "Bold Italic",   fn: c => cv(c, 0x1D468, 0x1D482, null) },
      { label: "Monospace",     fn: c => cv(c, 0x1D670, 0x1D68A, 0x1D7F6) },
      { label: "Double Struck", fn: c => cv(c, 0x1D538, 0x1D552, 0x1D7D8) },
      { label: "Fraktur",       fn: c => cv(c, 0x1D504, 0x1D51E, null) },
      { label: "Bold Fraktur",  fn: c => cv(c, 0x1D56C, 0x1D586, null) },
      { label: "Circled",       fn: c => circ(c) },
      { label: "Small Caps",    fn: c => sc(c) },
      { label: "Wide",          fn: c => wide(c) },
    ];

    function cv(c, U, L, D) {
      const n = c.codePointAt(0);
      if (n >= 65 && n <= 90) return String.fromCodePoint(U + n - 65);
      if (n >= 97 && n <= 122) return L ? String.fromCodePoint(L + n - 97) : c;
      if (D && n >= 48 && n <= 57) return String.fromCodePoint(D + n - 48);
      return c;
    }

    const CU = "ⒶⒷⒸⒹⒺⒻⒼⒽⒾⒿⓀⓁⓂⓃⓄⓅⓆⓇⓈⓉⓊⓋⓌⓍⓎⓏ";
    const CL = "ⓐⓑⓒⓓⓔⓕⓖⓗⓘⓙⓚⓛⓜⓝⓞⓟⓠⓡⓢⓣⓤⓥⓦⓧⓨⓩ";
    const CD = "⓪①②③④⑤⑥⑦⑧⑨";
    function circ(c) {
      const n = c.codePointAt(0);
      if (n >= 65 && n <= 90) return CU[n - 65];
      if (n >= 97 && n <= 122) return CL[n - 97];
      if (n >= 48 && n <= 57) return CD[n - 48];
      return c;
    }

    const SM = {A:'ᴀ',B:'ʙ',C:'ᴄ',D:'ᴅ',E:'ᴇ',F:'ꜰ',G:'ɢ',H:'ʜ',I:'ɪ',J:'ᴊ',K:'ᴋ',L:'ʟ',M:'ᴍ',N:'ɴ',O:'ᴏ',P:'ᴘ',Q:'Q',R:'ʀ',S:'s',T:'ᴛ',U:'ᴜ',V:'ᴠ',W:'ᴡ',X:'x',Y:'ʏ',Z:'ᴢ'};
    function sc(c) { return SM[c.toUpperCase()] || c; }

    function wide(c) {
      const n = c.codePointAt(0);
      if (n >= 33 && n <= 126) return String.fromCodePoint(n + 0xFF01 - 33);
      return c;
    }

    function tr(input, fn) { return [...input].map(fn).join(''); }

    function gen() {
      const v = document.getElementById('inp').value || 'MYFLiXBD.COM';
      document.getElementById('out').innerHTML = styles.map((s, i) => {
        const r = tr(v, s.fn);
        return `
          <div class="card">
            <div>
              <div class="style-label">${s.label}</div>
              <div class="preview-text" id="r${i}">${r}</div>
            </div>
            <button class="copy-btn" id="b${i}" onclick="cp(${i})">Copy</button>
          </div>`;
      }).join('');
    }

    function cp(i) {
      const t = document.getElementById('r' + i).textContent;
      navigator.clipboard.writeText(t).then(() => {
        const b = document.getElementById('b' + i);
        b.textContent = 'Copied!';
        b.classList.add('copied');
        setTimeout(() => { b.textContent = 'Copy'; b.classList.remove('copied'); }, 1500);
      });
    }

    gen();
  </script>
</body>
</html>
