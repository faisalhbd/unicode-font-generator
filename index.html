<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unicode Font Generator вҖ“ MYCINCEBD</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0a0a0a;
      color: #f0f0f0;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container { max-width: 700px; margin: 0 auto; }

    h1 {
      text-align: center;
      font-size: 1.6rem;
      font-weight: 700;
      color: #e22;
      margin-bottom: 0.3rem;
      letter-spacing: 0.04em;
    }

    .subtitle {
      text-align: center;
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 1.8rem;
    }

    .input-wrap {
      display: flex;
      gap: 10px;
      margin-bottom: 1rem;
    }

    input[type="text"] {
      flex: 1;
      font-size: 1rem;
      padding: 12px 16px;
      border: 2px solid #333;
      border-radius: 8px;
      background: #1a1a1a;
      color: #fff;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus { border-color: #e22; }

    .clear-btn {
      padding: 12px 18px;
      border: 2px solid #555;
      border-radius: 8px;
      background: transparent;
      color: #aaa;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .clear-btn:hover { border-color: #e22; color: #e22; }

    .color-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 1.6rem;
      flex-wrap: wrap;
    }

    .color-bar label {
      font-size: 0.82rem;
      color: #888;
      white-space: nowrap;
    }

    .presets { display: flex; gap: 8px; flex-wrap: wrap; }

    .preset {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: transform 0.15s, border-color 0.15s;
    }

    .preset:hover { transform: scale(1.18); }
    .preset.active { border-color: #fff; transform: scale(1.18); }

    .custom-color-wrap {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    input[type="color"] {
      width: 36px;
      height: 28px;
      border: none;
      border-radius: 6px;
      padding: 2px;
      background: #1a1a1a;
      cursor: pointer;
      outline: none;
    }

    .custom-label { font-size: 0.78rem; color: #666; }

    .grid { display: flex; flex-direction: column; gap: 10px; }

    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 14px 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: border-color 0.2s;
    }

    .card:hover { border-color: #444; }

    .style-label {
      font-size: 11px;
      color: #555;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .preview-text {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      word-break: break-all;
      transition: color 0.2s;
    }

    .copy-btn {
      flex-shrink: 0;
      margin-left: 12px;
      padding: 7px 18px;
      border: 2px solid #444;
      border-radius: 6px;
      background: transparent;
      color: #aaa;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.18s;
      white-space: nowrap;
    }

    .copy-btn:hover { border-color: #e22; color: #e22; }
    .copy-btn.copied { background: #e22; border-color: #e22; color: #fff; }

    footer {
      text-align: center;
      margin-top: 2.5rem;
      font-size: 0.75rem;
      color: #333;
    }

    @media (max-width: 480px) {
      .preview-text { font-size: 1.1rem; }
      h1 { font-size: 1.3rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Unicode Font Generator</h1>
    <p class="subtitle">Type your text вҖ” pick a color вҖ” copy any style for Facebook</p>

    <div class="input-wrap">
      <input type="text" id="inp" value="рқҗҢрқҗІрқҗңрқҗўрқҗ§рқҗһрқҗӣрқҗқ.рқҗңрқҗЁрқҗҰ" oninput="gen()" placeholder="Type here..." />
      <button class="clear-btn" onclick="document.getElementById('inp').value='';gen()">Clear</button>
    </div>

    <div class="color-bar">
      <label>Font Color:</label>
      <div class="presets" id="presets"></div>
      <div class="custom-color-wrap">
        <input type="color" id="customColor" value="#FFC0CB" oninput="setCustomColor(this.value)" />
        <span class="custom-label">Custom</span>
      </div>
    </div>

    <div class="grid" id="out"></div>

    <footer>Unicode Font Generator &copy; рқҗҢрқҗІрқҗңрқҗўрқҗ§рқҗһрқҗӣрқҗқ.рқҗңрқҗЁрқҗҰ</footer>
  </div>

  <script>
    const PRESETS = [
      { color: '#FFC0CB', label: 'Pink' },
      { color: '#ffffff', label: 'White' },
      { color: '#e22222', label: 'Red' },
      { color: '#1877f2', label: 'Blue' },
      { color: '#23c45e', label: 'Green' },
      { color: '#f5a623', label: 'Orange' },
      { color: '#9b59b6', label: 'Purple' },
      { color: '#00bcd4', label: 'Cyan' },
      { color: '#ff69b4', label: 'Pink' },
      { color: '#ffd700', label: 'Gold' },
    ];

    let currentColor = '#FFC0CB';

    function buildPresets() {
      const wrap = document.getElementById('presets');
      PRESETS.forEach((p, i) => {
        const btn = document.createElement('div');
        btn.className = 'preset' + (i === 0 ? ' active' : '');
        btn.style.background = p.color;
        btn.title = p.label;
        if (p.color === '#ffffff') btn.style.border = '2px solid #444';
        btn.onclick = () => {
          document.querySelectorAll('.preset').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          currentColor = p.color;
          document.getElementById('customColor').value = p.color;
          applyColor();
        };
        wrap.appendChild(btn);
      });
    }

    function setCustomColor(val) {
      currentColor = val;
      document.querySelectorAll('.preset').forEach(b => b.classList.remove('active'));
      applyColor();
    }

    function applyColor() {
      document.querySelectorAll('.preview-text').forEach(el => {
        el.style.color = currentColor;
      });
    }

    const styles = [
      { label: 'Bold',          fn: c => cv(c, 0x1D400, 0x1D41A, 0x1D7CE) },
      { label: 'Italic',        fn: c => cv(c, 0x1D434, 0x1D44E, null) },
      { label: 'Bold Italic',   fn: c => cv(c, 0x1D468, 0x1D482, null) },
      { label: 'Monospace',     fn: c => cv(c, 0x1D670, 0x1D68A, 0x1D7F6) },
      { label: 'Double Struck', fn: c => cv(c, 0x1D538, 0x1D552, 0x1D7D8) },
      { label: 'Fraktur',       fn: c => cv(c, 0x1D504, 0x1D51E, null) },
      { label: 'Bold Fraktur',  fn: c => cv(c, 0x1D56C, 0x1D586, null) },
      { label: 'Circled',       fn: c => circ(c) },
      { label: 'Small Caps',    fn: c => sc(c) },
      { label: 'Wide',          fn: c => wide(c) },
    ];

    function cv(c, U, L, D) {
      const n = c.codePointAt(0);
      if (n >= 65 && n <= 90) return String.fromCodePoint(U + n - 65);
      if (n >= 97 && n <= 122) return L ? String.fromCodePoint(L + n - 97) : c;
      if (D && n >= 48 && n <= 57) return String.fromCodePoint(D + n - 48);
      return c;
    }

    const CU = "в’¶в’·в’ёв’№в’әв’»в’јв’Ҫв’ҫв’ҝв“Җв“Ғв“Ӯв“ғв“„в“…в“Ҷв“Үв“Ҳв“үв“Ҡв“Ӣв“Ңв“Қв“Һв“Ҹ";
    const CL = "в“җв“‘в“’в““в“”в“•в“–в“—в“ҳв“ҷв“ҡв“ӣв“ңв“қв“һв“ҹв“ в“Ўв“ўв“Јв“Өв“Ҙв“Ұв“§в“Ёв“©";
    const CD = "в“Әв‘ в‘Ўв‘ўв‘Јв‘Өв‘Ҙв‘Ұв‘§в‘Ё";
    function circ(c) {
      const n = c.codePointAt(0);
      if (n >= 65 && n <= 90) return CU[n - 65];
      if (n >= 97 && n <= 122) return CL[n - 97];
      if (n >= 48 && n <= 57) return CD[n - 48];
      return c;
    }

    const SM = {A:'бҙҖ',B:'Кҷ',C:'бҙ„',D:'бҙ…',E:'бҙҮ',F:'кң°',G:'Йў',H:'Кң',I:'ЙӘ',J:'бҙҠ',K:'бҙӢ',L:'Кҹ',M:'бҙҚ',N:'Йҙ',O:'бҙҸ',P:'бҙҳ',Q:'Q',R:'КҖ',S:'s',T:'бҙӣ',U:'бҙң',V:'бҙ ',W:'бҙЎ',X:'x',Y:'КҸ',Z:'бҙў'};
    function sc(c) { return SM[c.toUpperCase()] || c; }

    function wide(c) {
      const n = c.codePointAt(0);
      if (n >= 33 && n <= 126) return String.fromCodePoint(n + 0xFF01 - 33);
      return c;
    }

    function tr(input, fn) { return [...input].map(fn).join(''); }

    function gen() {
      const v = document.getElementById('inp').value || 'рқҗҢрқҗІрқҗңрқҗўрқҗ§рқҗһрқҗӣрқҗқ.рқҗңрқҗЁрқҗҰ';
      document.getElementById('out').innerHTML = styles.map((s, i) => {
        const r = tr(v, s.fn);
        return `
          <div class="card">
            <div style="flex:1;min-width:0;">
              <div class="style-label">${s.label}</div>
              <div class="preview-text" id="r${i}" style="color:${currentColor}">${r}</div>
            </div>
            <button class="copy-btn" id="b${i}" onclick="cp(${i})">Copy</button>
          </div>`;
      }).join('');
    }

    function cp(i) {
      const t = document.getElementById('r' + i).textContent;
      navigator.clipboard.writeText(t).then(() => {
        const b = document.getElementById('b' + i);
        b.textContent = 'Copied!';
        b.classList.add('copied');
        setTimeout(() => { b.textContent = 'Copy'; b.classList.remove('copied'); }, 1500);
      });
    }

    buildPresets();
    gen();
  </script>
</body>
</html>
